name: release

# Cut a release by pushing a tag like `v0.1.0`. Each matrix target builds a
# stripped release binary, tarballs/zips it with a SHA-256 checksum, and uploads
# it to the GitHub Release for the tag. `install.sh` consumes these assets.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # The upload action attaches assets to an *existing* Release, so create it
  # from the tag first; the build matrix then uploads into it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: ${{ matrix.target }}
    needs: create-release
    strategy:
      # One flaky cross target must not block the others from publishing.
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          # Cross-compile the Intel build on Apple-Silicon runners — the macos-13
          # (Intel) pool is scarce and can queue for many minutes.
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # aws-lc-rs (pulled in by rustls) needs NASM to build on Windows.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      # Sets up the cross linker/toolchain so `cargo build --target` works for
      # the musl and aarch64 Linux targets (no-op for the native host target).
      - name: Set up cross toolchain (Linux)
        if: runner.os == 'Linux'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: tmail
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
